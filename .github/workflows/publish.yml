name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (token)
        id: token_publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload dist/* --disable-progress-bar --skip-existing
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to PyPI (trusted publishing)
        id: trusted_publish
        if: steps.token_publish.outputs.published != 'true'
        continue-on-error: true
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Verify PyPI release
        if: steps.token_publish.outputs.published != 'true' && steps.trusted_publish.outcome != 'success'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/echotools/${VERSION}/json")
          if [ "$CODE" = "200" ]; then
            echo "::notice::echotools ${VERSION} already on PyPI."
          else
            echo "::error::Publish failed and echotools ${VERSION} not found on PyPI."
            exit 1
          fi
